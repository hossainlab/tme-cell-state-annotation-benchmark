# Central config for the TME annotation benchmark.
# Both Python and R scripts read this so dataset paths, label maps,
# and granularity levels stay consistent across languages.

paths:
  data_raw: data/raw
  predictions: results/predictions   # one file per tool: <dataset>__<tool>.csv (cell_id, predicted_label)
  metrics: results/metrics
  figures: results/figures

datasets:
  # Column names below are the ACTUAL headers in the downloaded annotation files
  # (verified against the data), not the paper's prose names.
  GSE131907:                          # primary ground truth — lung adenocarcinoma
    role: primary
    format: geo_text_matrix           # genes x cells .txt.gz; header "Index" + barcode cols
    matrix: data/raw/GSE131907/GSE131907_Lung_Cancer_raw_UMI_matrix.txt.gz
    annotation: data/raw/GSE131907/GSE131907_Lung_Cancer_cell_annotation.txt.gz
    annotation_sep: "\t"
    barcode_column: Index             # annotation col matching the matrix column names
    truth_column: Cell_subtype        # FINEST author label (e.g. mo-Mac), not broad Cell_type
    lineage_column: Cell_type         # broad lineage, used only for the non-malignant filter
    condition_column: Sample_Origin   # nLung/tLung/nLN/mLN/mBrain/PE/tL-B
    sample_column: Sample             # batch key for Harmony (e.g. LUNG_N01)
    exclude_lineages: ["Epithelial cells", "Undetermined"]   # drop malignant + junk
    download_url: "https://ftp.ncbi.nlm.nih.gov/geo/series/GSE131nnn/GSE131907/suppl/"
  GSE132465:                          # replication — colorectal
    role: replication
    format: geo_text_matrix
    matrix: data/raw/GSE132465/GSE132465_GEO_processed_CRC_10X_raw_UMI_count_matrix.txt.gz
    annotation: data/raw/GSE132465/GSE132465_GEO_processed_CRC_10X_cell_annotation.txt.gz
    annotation_sep: "\t"
    barcode_column: Index
    truth_column: Cell_subtype
    lineage_column: Cell_type
    condition_column: Class           # Tumor / Normal
    sample_column: Sample             # e.g. SMC01-T
    exclude_lineages: ["Epithelial cells"]
    download_url: "https://ftp.ncbi.nlm.nih.gov/geo/series/GSE132nnn/GSE132465/suppl/"
  Zheng68K:                           # healthy accuracy ceiling
    role: healthy_baseline
    format: tenx_mtx                  # 10x MatrixMarket triplet + separate label tsv
    mtx_dir: data/raw/Zheng68K/filtered_matrices_mex/hg19
    annotation: data/raw/Zheng68K/68k_pbmc_barcodes_annotation.tsv
    annotation_sep: "\t"
    barcode_column: barcodes
    truth_column: celltype
    sample_column: null               # single sample — no batch correction needed
    exclude_lineages: []              # healthy PBMC: nothing to exclude

# QC thresholds — deliberately loose for cancer (pitfall, cancer cells are active).
qc:
  min_genes: 200
  max_genes: 6000
  max_pct_mt: 20

preprocess:
  n_top_genes: 2000
  n_pcs: 50
  batch_key: sample_id               # scVI integrates over this; UMAP must NOT cluster by it
  target_sum: 10000

# Batch integration before building the neighbour graph (project guide pitfall #3).
# scVI (GPU) replaces Harmony, which returns a degenerate embedding in this env.
integration:
  method: scvi                       # scvi (multi-sample) | pca (single sample / fallback)
  n_latent: 30
  n_layers: 2
  max_epochs: null                   # null -> scVI auto (fewer epochs for large datasets)
  batch_size: 1024                   # bigger = fewer iters, better GPU use; lower on CUDA OOM
  num_workers: 8                     # dataloader workers feeding the GPU (0 = main thread)
  hvg_flavor: seurat_v3              # operates on raw counts; needs scikit-misc

# Hardware tuning — set to YOUR machine. Defaults sized for the dev box:
# AMD Ryzen 9 5950X (16C/32T) + NVIDIA RTX 3080 (10 GB), CUDA.
# n_cores = PHYSICAL cores: using all 32 threads oversubscribes the RAM-heavy
# steps (text-matrix read, SingleR) and usually runs slower.
compute:
  n_cores: 16
  gpu: true
  device: cuda                       # used by scGPT / any GPU step; "cpu" to force off
  scgpt_batch_size: 32               # fits 10 GB VRAM — lower if you hit CUDA OOM
  read_chunksize: 4000               # genes per chunk in the text-matrix reader (more RAM = larger)

# Three granularity levels. Hypothesis: accuracy high at L1, collapses at L3.
# Map raw author labels -> each level. Fill in per dataset as labels are confirmed.
label_levels:
  coarse:   [T cell, Myeloid, Fibroblast, Epithelial, Endothelial, B cell]
  medium:   [CD8 T, CD4 T, NK, Macrophage, Monocyte, DC, CAF, Myofibroblast]
  fine:     [Exhausted CD8, Naive CD8, Effector CD8, Tpex, Tex,
             SPP1+ TAM, CCL18+ TAM, Inflammatory TAM, Resident macrophage,
             iCAF, myCAF, matCAF]

tools:
  python: [celltypist, scgpt]
  r:      [singler, azimuth, gptcelltype, scatomic]

celltypist:
  # "Pan_Human_Atlas" is NOT a real CellTypist model. Immune_All_Low is the
  # flagship general model: 98 FINE immune subtypes (incl. macrophage / T-cell
  # states this benchmark targets). It is immune-only — fibroblast/CAF and
  # epithelial cells get mislabelled to the nearest immune type, which is itself
  # an expected limitation/finding for a general immune annotator.
  model: Immune_All_Low.pkl
  majority_voting: true

gptcelltype:
  model: gpt-4
  n_runs: 3                          # non-deterministic; report modal label + disagreement rate
  tissuenames: ["lung tumour", "lung"]   # run both to measure cancer-context effect

# scGPT runs in a SEPARATE env (.venv-scgpt) — see scripts/03_run_scgpt.py header.
# Zero-shot reference mapping: embed query + a labelled reference with the
# pretrained model, then transfer labels by kNN in the embedding space.
scgpt:
  checkpoint_dir: models/scGPT_human       # holds best_model.pt, vocab.json, args.json
  reference: ""                            # path to a LABELLED reference .h5ad (REQUIRED)
  reference_label_column: cell_type        # obs column in the reference with the labels
  gene_column: gene_name                   # var column holding gene symbols
  n_neighbors: 30                          # kNN for label transfer
  max_length: 1200                         # scGPT input gene budget per cell
